# kantin-ingress.yaml — VERSI TUGAS 2 (tanpa host)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: kantin-ingress
  annotations:
    nginx.ingress.kubernetes.io/use-regex: "true"
spec:
  ingressClassName: nginx   # ← Penting! Sambungkan ke NGINX Ingress Controller
  rules:
  - http:                   # ← Tidak ada "host:" → pakai IP langsung
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: backend-service
            port:
              number: 5000
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend-service
            port:
              number: 80