<!DOCTYPE html>
<html>
<head><title>E-Kantin</title></head>
<body>
    <!-- Identitas mahasiswa (dari API yang inject dari YAML) -->
    <div style="background:#f0f0f0; padding:10px; margin-bottom:20px; border-radius:5px;">
        <strong>Identitas:</strong>
        <span id="nama-mahasiswa">Memuat...</span> |
        NIM: <span id="nim-mahasiswa">Memuat...</span>
    </div>

    <h1 id="kantin-name">Memuat...</h1>
    <ul id="menu-list"></ul>

    <hr>
    <h3>Tambah Menu Baru:</h3>
    <input type="text" id="menu-input" placeholder="Nama makanan...">
    <button onclick="tambahMenu()">Tambah</button>

    <script>
        const API_URL = '/api';  // ← Relative path, sesuai soal!

        function loadData() {
            fetch(`${API_URL}/info`)
                .then(res => res.json())
                .then(data => {
                    document.getElementById('kantin-name').innerText = data.nama_kantin;
                    const list = document.getElementById('menu-list');
                    list.innerHTML = '';
                    data.menu.forEach(item => {
                        let li = document.createElement('li');
                        li.innerText = item;
                        list.appendChild(li);
                    });
                });
        }

        // Ambil dan tampilkan identitas dari backend
        function loadIdentitas() {
            fetch(`${API_URL}/identitas`)
                .then(res => res.json())
                .then(data => {
                    document.getElementById('nama-mahasiswa').innerText = data.nama;
                    document.getElementById('nim-mahasiswa').innerText = data.nim;
                });
        }

        function tambahMenu() {
            const input = document.getElementById('menu-input');
            fetch(`${API_URL}/add-menu`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ item: input.value })
            })
            .then(res => res.json())
            .then(() => {
                input.value = '';
                loadData();
            });
        }

        loadData();
        loadIdentitas();  // ← Panggil saat halaman load
    </script>
</body>
</html>
